# AeroSpace Configuration
# Source of truth: /Users/jian/Dev/workspace/configs/aerospace/aerospace.toml
# Symlinked to: ~/.aerospace.toml

config-version = 2
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
gaps.inner.horizontal = 0
gaps.inner.vertical = 0
gaps.outer.left = 0
gaps.outer.bottom = 0
gaps.outer.top = 0
gaps.outer.right = 0

# =============================================================================
# CALLBACKS
# =============================================================================

# Focus/workspace change handler
on-focus-changed = ['exec-and-forget ~/.config/aerospace/on_focus.sh']

# =============================================================================
# DEFAULT: All windows start floating and move to focused workspace
# =============================================================================

[[on-window-detected]]
check-further-callbacks = true
run = ['layout floating', 'exec-and-forget ~/.config/aerospace/move_to_focused.sh']

# =============================================================================
# HOME APPS: Trigger on window open
# =============================================================================

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = ['exec-and-forget ~/.config/aerospace/on_window.sh com.microsoft.VSCode']

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = ['exec-and-forget ~/.config/aerospace/on_window.sh app.zen-browser.zen']

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = ['exec-and-forget ~/.config/aerospace/on_window.sh com.apple.Safari']

[[on-window-detected]]
if.app-id = 'com.getupnote.desktop'
run = ['exec-and-forget ~/.config/aerospace/on_window.sh com.getupnote.desktop']

[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = ['exec-and-forget ~/.config/aerospace/on_window.sh com.openai.codex']

[[on-window-detected]]
if.app-id = 'com.apple.Terminal'
run = ['exec-and-forget ~/.config/aerospace/on_window.sh com.apple.Terminal']

[[on-window-detected]]
if.app-id = 'com.tdesktop.Telegram'
run = ['exec-and-forget ~/.config/aerospace/on_window.sh com.tdesktop.Telegram']

# =============================================================================
# KEYBINDINGS
# =============================================================================

[mode.main.binding]
# Workspace layouts
ctrl-1 = 'exec-and-forget ~/.config/aerospace/switch_ws.sh w1'     # Switch to w1
ctrl-w = 'exec-and-forget ~/.config/aerospace/reset_ws.sh'         # Reset to workspace defaults
ctrl-e = 'exec-and-forget ~/.config/aerospace/balance.sh'          # Rebalance columns
ctrl-q = 'layout floating tiling'                                  # Pin/unpin window

# Navigation (vim-style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'exec-and-forget ~/.config/aerospace/move_and_balance.sh left'
alt-shift-j = 'exec-and-forget ~/.config/aerospace/move_and_balance.sh down'
alt-shift-k = 'exec-and-forget ~/.config/aerospace/move_and_balance.sh up'
alt-shift-l = 'exec-and-forget ~/.config/aerospace/move_and_balance.sh right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Layout
ctrl-f = 'fullscreen'
ctrl-shift-v = 'exec-and-forget ~/.config/aerospace/video_mode.sh' # Toggle video mode (Zen 100%)
